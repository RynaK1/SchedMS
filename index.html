<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SchedMS - MapleStory To-Do</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>SchedMS</h1>
        <div class="status-pill" id="save-status">Auto-saved</div>
      </header>

      <nav class="top-tabs" aria-label="Main navigation tabs">
        <button class="top-tab active" data-view="lists">Lists</button>
        <button class="top-tab" data-view="options">Options</button>
      </nav>

      <section id="lists-view" class="view active">
        <div class="list-stack">
          <section class="todo-card todo-primary" data-list="todo">
            <div class="card-header"><h2>Main To-Do</h2></div>
            <div class="status-tabs" role="tablist" aria-label="Main To-Do status tabs">
              <button class="status-tab active" data-list="todo" data-filter="unfinished">Unfinished</button>
              <button class="status-tab" data-list="todo" data-filter="finished">Finished</button>
            </div>
            <form class="add-task-form" data-list="todo">
              <label class="sr-only" for="todo-input">Add main to-do task</label>
              <input id="todo-input" type="text" maxlength="120" placeholder="Add task" required />
              <div class="owner-buttons" role="group" aria-label="Pick person for to-do task">
                <button type="button" class="owner-btn active" data-list="todo" data-owner="p1" id="todo-owner-p1">Player 1</button>
                <button type="button" class="owner-btn" data-list="todo" data-owner="p2" id="todo-owner-p2">Player 2</button>
              </div>
              <button type="submit">Add</button>
            </form>
            <p id="todo-error" class="form-msg" role="alert"></p>
            <ul id="todo-list" class="task-list"></ul>
            <p id="todo-empty" class="empty-msg">No tasks in this tab yet.</p>
          </section>

          <section class="todo-card daily-card" data-list="daily">
            <div class="card-header">
              <h2>Daily</h2>
              <span id="daily-reset-label" class="reset-label"></span>
            </div>
            <div class="status-tabs" role="tablist" aria-label="Daily status tabs">
              <button class="status-tab active" data-list="daily" data-filter="unfinished">Unfinished</button>
              <button class="status-tab" data-list="daily" data-filter="finished">Finished</button>
            </div>
            <form class="add-task-form" data-list="daily">
              <label class="sr-only" for="daily-input">Add daily task</label>
              <input id="daily-input" type="text" maxlength="120" placeholder="Add daily task" required />
              <div class="owner-buttons" role="group" aria-label="Pick person for daily task">
                <button type="button" class="owner-btn active" data-list="daily" data-owner="p1" id="daily-owner-p1">Player 1</button>
                <button type="button" class="owner-btn" data-list="daily" data-owner="p2" id="daily-owner-p2">Player 2</button>
              </div>
              <button type="submit">Add</button>
            </form>
            <p id="daily-error" class="form-msg" role="alert"></p>
            <ul id="daily-list" class="task-list"></ul>
            <p id="daily-empty" class="empty-msg">No tasks in this tab yet.</p>
          </section>

          <section class="todo-card weekly-card" data-list="weekly">
            <div class="card-header">
              <h2>Weekly</h2>
              <span id="weekly-reset-label" class="reset-label"></span>
            </div>
            <div class="status-tabs" role="tablist" aria-label="Weekly status tabs">
              <button class="status-tab active" data-list="weekly" data-filter="unfinished">Unfinished</button>
              <button class="status-tab" data-list="weekly" data-filter="finished">Finished</button>
            </div>
            <form class="add-task-form" data-list="weekly">
              <label class="sr-only" for="weekly-input">Add weekly task</label>
              <input id="weekly-input" type="text" maxlength="120" placeholder="Add weekly task" required />
              <div class="owner-buttons" role="group" aria-label="Pick person for weekly task">
                <button type="button" class="owner-btn active" data-list="weekly" data-owner="p1" id="weekly-owner-p1">Player 1</button>
                <button type="button" class="owner-btn" data-list="weekly" data-owner="p2" id="weekly-owner-p2">Player 2</button>
              </div>
              <button type="submit">Add</button>
            </form>
            <p id="weekly-error" class="form-msg" role="alert"></p>
            <ul id="weekly-list" class="task-list"></ul>
            <p id="weekly-empty" class="empty-msg">No tasks in this tab yet.</p>
          </section>
        </div>

        <section class="tool-row">
          <button id="undo-delete" class="ghost-btn" disabled>Undo last delete</button>
        </section>
      </section>

      <section id="options-view" class="view">
        <section class="todo-card options-card">
          <h2>Options</h2>

          <h3>Player Names</h3>
          <div class="option-row">
            <label for="person1-name">Player 1 name</label>
            <input id="person1-name" type="text" maxlength="30" />
          </div>
          <div class="option-row">
            <label for="person2-name">Player 2 name</label>
            <input id="person2-name" type="text" maxlength="30" />
          </div>

          <h3>Reset Settings</h3>
          <div class="option-row">
            <label for="reset-time">Reset time</label>
            <input id="reset-time" type="time" />
          </div>
          <div class="option-row">
            <label for="weekly-reset-day">Weekly reset day</label>
            <select id="weekly-reset-day">
              <option value="0">Sunday</option>
              <option value="1">Monday</option>
              <option value="2">Tuesday</option>
              <option value="3">Wednesday</option>
              <option value="4">Thursday</option>
              <option value="5">Friday</option>
              <option value="6">Saturday</option>
            </select>
          </div>
          <div class="option-row">
            <label for="timezone-offset">Time zone</label>
            <select id="timezone-offset"></select>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
